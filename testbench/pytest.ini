[pytest]
# Run from the testbench/ directory: `pytest`
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Make snapshot.py importable from test modules and keep test output visible.
pythonpath = .
# -s   : show prints / parser logs live
# -v   : one line per test
# -x   : stop at the FIRST failure so the structured parser output above it
#        stays at the bottom of the run, easy to evaluate
# -ra  : summarize skips/xfails at the end
# --showlocals : dump local vars in tracebacks
addopts = -s -v -x -ra --showlocals
